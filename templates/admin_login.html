<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Nithin.dev</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=static_v) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css', v=static_v) }}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top, rgba(124, 58, 237, 0.32), transparent 45%),
                        radial-gradient(circle at bottom, rgba(34, 211, 238, 0.22), transparent 55%),
                        linear-gradient(135deg, #05070f, #070a12 60%, #05070f);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-header {
            margin-bottom: 2rem;
        }

        .login-logo {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #7c3aed, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .login-title {
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .login-subtitle {
            color: rgba(229, 231, 255, 0.72);
            font-size: 0.95rem;
        }

        .login-form {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-label {
            display: block;
            color: rgba(229, 231, 255, 0.9);
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            outline: none;
            transition: all 0.25s ease;
            font-size: 1rem;
        }

        .form-input:focus {
            border-color: rgba(124, 58, 237, 0.6);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input::placeholder {
            color: rgba(229, 231, 255, 0.5);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #7c3aed, #22d3ee);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
        }

        .back-link {
            display: inline-block;
            color: rgba(229, 231, 255, 0.72);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.25s ease;
        }

        .back-link:hover {
            color: var(--text);
        }

        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .alert--error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .alert--success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem;
                margin: 1rem;
            }

            .login-logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <header class="login-header">
                <div class="login-logo">N</div>
                <h1 class="login-title">Admin Access</h1>
                <p class="login-subtitle">Please sign in to manage your portfolio</p>
            </header>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert--{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" class="form-input" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-input" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <a href="{{ url_for('home') }}" class="back-link">&lt;- Back to Portfolio</a>
        </div>
    </div>

    <footer class="footer">
        <p class="footer__copy">© 2026 Nithin.dev — Admin Login</p>
    </footer>
</body>
</html>
